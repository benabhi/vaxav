version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vaxav-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - vaxav-network
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    container_name: vaxav-web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vaxav-network
    depends_on:
      - app

  db:
    image: postgres:15-alpine
    container_name: vaxav-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vaxav}
      POSTGRES_USER: ${DB_USERNAME:-vaxav}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - vaxav-network

  redis:
    image: redis:alpine
    container_name: vaxav-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - vaxav-network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vaxav-queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - vaxav-network
    depends_on:
      - db
      - redis

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vaxav-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - vaxav-network
    depends_on:
      - db
      - redis

networks:
  vaxav-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
